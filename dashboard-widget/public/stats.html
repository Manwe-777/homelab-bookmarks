<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browsing Stats</title>
  <link rel="stylesheet" href="stats.css">
  <script>
    // Apply theme immediately to prevent flash (URL param > localStorage)
    const p = new URLSearchParams(location.search).get('theme');
    const t = p || localStorage.getItem('smartBookmarksTheme');
    if (t && t !== 'default') document.documentElement.setAttribute('data-theme', t);
    // Listen for Glance parent theme broadcasts with full CSS variable sync
    window.addEventListener('message', function(e) {
      if (e.data && e.data.glanceTheme) {
        var gt = e.data.glanceTheme;
        console.log('[Bookmarks] received Glance theme:', gt);
        var r = document.documentElement.style;
        if (gt.scheme === 'light') {
          r.setProperty('--scheme', '100% -');
          document.documentElement.setAttribute('data-theme', 'light');
        } else {
          r.setProperty('--scheme', ' ');
          document.documentElement.removeAttribute('data-theme');
        }
        if (gt.bgh) r.setProperty('--bgh', gt.bgh);
        if (gt.bgs) r.setProperty('--bgs', gt.bgs);
        if (gt.bgl) r.setProperty('--bgl', gt.bgl);
        if (gt.cm) r.setProperty('--cm', gt.cm);
        if (gt.tsm) r.setProperty('--tsm', gt.tsm);
        if (gt.primary) r.setProperty('--color-primary', gt.primary);
        if (gt.positive) r.setProperty('--color-positive', gt.positive);
        if (gt.negative) r.setProperty('--color-negative', gt.negative);
      }
    });
  </script>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <a href="/" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="15 18 9 12 15 6"></polyline></svg>
        Bookmarks
      </a>
      <h1 class="page-title">Browsing Stats</h1>
    </header>

    <div class="widgets">
      <!-- Day of week -->
      <div class="widget">
        <div class="widget-header">Activity by Day of Week</div>
        <div class="widget-content">
          <div id="dayChart" class="day-chart"><div class="loading">Loading...</div></div>
        </div>
      </div>

      <!-- Hour of day -->
      <div class="widget">
        <div class="widget-header hour-header">Activity by Hour of Day</div>
        <div class="widget-content">
          <div id="hourChart" class="hour-graph"><div class="loading">Loading...</div></div>
        </div>
      </div>

      <!-- Top sites -->
      <div class="widget">
        <div class="widget-header">Most Visited Sites</div>
        <div class="widget-content">
          <div id="topSites"><div class="loading">Loading...</div></div>
        </div>
      </div>
    </div>
  </div>

  <script src="stats.js"></script>
</body>
</html>
